<div class="container">
    <div class="container text-center" style="margin: 30px;">
        <h3>Editar Producto</h3>
    </div>
    <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label for="Descripcion" class="form-label">Descripcion</label>
            <input type="text" class="form-control" id="Descripcion" name="Descripcion" aria-describedby="emailHelp"
            [(ngModel)]="producto.descripcion">
        </div>
        <div class="mb-3">
            <label for="precio" class="form-label">Precio</label>
            <input type="number" step="any" class="form-control" id="precio" name="precio" 
            [(ngModel)]="producto.precio">
        </div>
        <div class="mb-3">
            <label for="existencia" class="form-label">existencia</label>
            <input type="number" class="form-control" id="existencia" name="existencia" 
            [(ngModel)]="producto.existencia">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-success" style="margin-right: 10px;">Editar Producto</button>
            <a href="/" class="btn btn-info" style="text-decoration: none; color: aliceblue;">Regregsar</a> 
        </div>

    </form>
</div>
